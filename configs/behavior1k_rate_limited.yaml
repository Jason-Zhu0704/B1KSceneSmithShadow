# Rate-limited config for no-GPU continuous runs.
# Goal: reduce API request frequency and finish floor_plan stage more reliably
# under proxy rate limits.

floor_plan_agent:
  session_memory:
    enabled: false
    enable_summarization: false
  materials:
    use_retrieval_server: false
    default_wall_material: "Plaster001_1K-JPG"
    default_floor_material: "Wood094_1K-JPG"
  agents:
    planner_agent:
      max_turns: 12
    designer_agent:
      max_turns: 16
    critic_agent:
      max_turns: 4
  max_critique_rounds: 0
  api_timeout:
    connect: 30.0
    read: 180.0
    write: 180.0
    pool: 180.0
  openai:
    reasoning_effort:
      planner: "low"
      designer: "low"
      critic: "low"
    verbosity:
      planner: "low"
      designer: "low"
      critic: "low"

furniture_agent:
  asset_manager:
    router:
      strategies:
        articulated:
          enabled: false
        thin_covering:
          enabled: false

wall_agent:
  asset_manager:
    router:
      strategies:
        articulated:
          enabled: false
        thin_covering:
          enabled: false

ceiling_agent:
  asset_manager:
    router:
      strategies:
        articulated:
          enabled: false
        thin_covering:
          enabled: false

manipuland_agent:
  asset_manager:
    router:
      strategies:
        articulated:
          enabled: false
        thin_covering:
          enabled: false
